<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #030208;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #f6f3ff;
      position: relative;
    }

    /* Purple radial glows */
    .glow-tl {
      position: absolute;
      top: -120px; left: -80px;
      width: 600px; height: 500px;
      background: radial-gradient(circle, rgba(147,51,234,0.32) 0%, transparent 70%);
      pointer-events: none;
    }
    .glow-br {
      position: absolute;
      bottom: -100px; right: -60px;
      width: 500px; height: 400px;
      background: radial-gradient(circle, rgba(34,211,238,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Grid overlay */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(192,132,252,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,132,252,0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Border */
    .border {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(192,132,252,0.2);
      pointer-events: none;
    }

    /* Accent bar top */
    .accent-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #9333ea, #c084fc, #22d3ee);
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding: 0 80px;
    }

    .eyebrow {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c084fc;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 72px;
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #f6f3ff;
      margin-bottom: 12px;
    }

    h1 span {
      color: #c084fc;
    }

    .tagline {
      font-size: 20px;
      font-weight: 400;
      color: #d0c8e2;
      margin-bottom: 40px;
      max-width: 900px;
      line-height: 1.4;
      white-space: nowrap;
    }

    /* Cert chips row */
    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 99px;
      background: rgba(147,51,234,0.15);
      border: 1px solid rgba(147,51,234,0.35);
      color: #eee7ff;
      letter-spacing: 0.02em;
    }

    .chip.highlight {
      background: rgba(192,132,252,0.18);
      border-color: rgba(192,132,252,0.45);
      color: #c084fc;
    }

    .chip.gold {
      background: rgba(234,179,8,0.15);
      border-color: rgba(234,179,8,0.45);
      color: #fde047;
      font-size: 14px;
      font-weight: 700;
      padding: 7px 18px;
    }

    /* Domain badge bottom-right */
    .domain {
      position: absolute;
      bottom: 36px;
      right: 80px;
      font-size: 15px;
      font-weight: 600;
      color: rgba(192,132,252,0.7);
      letter-spacing: 0.04em;
      z-index: 1;
    }

    /* Location bottom-left */
    .location {
      position: absolute;
      bottom: 36px;
      left: 80px;
      font-size: 14px;
      color: rgba(148,136,173,0.8);
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="grid"></div>
  <div class="border"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <p class="eyebrow">Portfolio &mdash; masternazz.com</p>
    <h1>Nazeem<br><span>Massoom Dickey</span></h1>
    <p class="tagline">IT &amp; Cybersecurity &mdash; Network Admin, SOC Analyst &amp; Homelab Engineer</p>
    <div class="chips">
      <span class="chip gold">&#x1F947; SkillsUSA FL Internetworking — Gold Medal</span>
      <span class="chip highlight">CySA+</span>
      <span class="chip highlight">Security+</span>
      <span class="chip highlight">Network+</span>
      <span class="chip highlight">A+</span>
      <span class="chip">CCST Cyber</span>
      <span class="chip">AB-900</span>
    </div>
  </div>

  <span class="domain">masternazz.com</span>
  <span class="location">&#x1F4CD; Boynton Beach, FL</span>
</body>
</html>
