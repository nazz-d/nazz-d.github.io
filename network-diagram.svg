  <text x="1018" y="284" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">☁  Cloudflare CDN + WAF</text>
  <text x="1018" y="302" text-anchor="middle" fill="#4b6e40" font-size="10">*.masternazz.com · Public HTTPS ingress</text>

