<svg width="1200" height="960" viewBox="0 0 1200 960" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0d0a18"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#9333ea" stroke-width="0.2" opacity="0.35"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#7c3aed" opacity="0.75"/>
    </marker>
    <marker id="arrOrange" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#d97706" opacity="0.75"/>
    </marker>
    <marker id="arrTeal" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#0d9488" opacity="0.75"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="960" fill="url(#bg)"/>
  <rect width="1200" height="960" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" fill="#c084fc" font-size="15" font-weight="700" letter-spacing="2">masternazz.com — Network Topology</text>
  <text x="600" y="48" text-anchor="middle" fill="#4b4266" font-size="10" letter-spacing="1">Enterprise homelab · sanitized for public viewing</text>

  <!-- ═══════════════ INTERNET ═══════════════ -->
