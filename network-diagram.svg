  <text x="1018" y="213" text-anchor="middle" fill="#9488ad" font-size="10">Cloudflared Tunnel connector</text>
  <text x="1018" y="225" text-anchor="middle" fill="#4b4266" font-size="9">Public-facing services · no direct LAN access</text>

  <!-- DMZ → Cloudflare -->
  <line x1="1018" y1="230" x2="1018" y2="262" stroke="#d97706" stroke-width="1.5" opacity="0.6" marker-end="url(#arrOrange)"/>

