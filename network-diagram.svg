  <text x="580" y="81" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">☁  INTERNET / ISP</text>
  <text x="580" y="99" text-anchor="middle" fill="#4b6e7a" font-size="10">WAN uplink · DHCP</text>

  <!-- Internet → OPNsense -->
  <line x1="580" y1="108" x2="490" y2="148" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arr)"/>

  <!-- ═══════════════ OPNSENSE ═══════════════ -->
  <rect x="100" y="148" width="680" height="82" rx="8" fill="url(#card)" stroke="#9333ea" stroke-width="2" filter="url(#glow)"/>
  <rect x="100" y="148" width="680" height="5" rx="4" fill="url(#purpleBar)"/>
  <rect x="116" y="162" width="3" height="56" rx="2" fill="#9333ea"/>
  <text x="136" y="179" fill="#f6f3ff" font-size="13" font-weight="700">OPNsense Firewall / Router</text>
  <text x="136" y="196" fill="#9488ad" font-size="10">Edge firewall · WAN uplink · LAN segment · Public DMZ (VLAN 50) · explicit firewall rules</text>
  <text x="136" y="212" fill="#9488ad" font-size="10">AdGuard DNS · Suricata IDS/IPS (WAN netmap) · ACME Wildcard SSL · NAT</text>
  <text x="136" y="224" fill="#4b4266" font-size="9">Encrypted management access only · deny-by-default · no raw ports exposed to internet</text>

  <!-- OPNsense → DMZ (right arrow) -->
  <line x1="780" y1="189" x2="858" y2="189" stroke="#d97706" stroke-width="1.5" opacity="0.7" marker-end="url(#arrOrange)"/>

